services:
  db:
    image: pgvector/pgvector:pg16
    container_name: doc_intel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doc_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doc_intel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot service: runs Alembic migrations then exits (exit code 0).
  # The api and celery_worker services depend on this completing successfully.
  migrate:
    build: .
    container_name: doc_intel_migrate
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/doc_intelligence
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: alembic upgrade head
    restart: "no"

  api:
    build: .
    container_name: doc_intel_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/doc_intelligence
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: doc_intel_celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/doc_intelligence
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data: